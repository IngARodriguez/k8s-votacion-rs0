apiVersion: v1
kind: Service
metadata:
  name: mongo-arb-svc
  labels:
    app: mongo-arb
spec:
  clusterIP: None
  selector:
    app: mongo-arb
  ports:
  - name: mongo
    protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-arb
spec:
  serviceName: mongo-arb-svc
  replicas: 1
  selector:
    matchLabels:
      app: mongo-arb
  template:
    metadata:
      labels:
        app: mongo-arb
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mongo
        image: mongo:7
        command:
        - mongod
        - "--bind_ip_all"
        - "--replSet"
        - "rs0"
        - "--port"
        - "27017"
        ports:
        - containerPort: 27017
          name: mongo
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 256Mi
